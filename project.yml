name: MacRef

options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  MacRef:
    type: application
    platform: macOS
    sources:
      - path: MacRef
        excludes:
          - "**/*.plist"       # we supply our own Info.plist below
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.MacRef
        PRODUCT_NAME: MacRef
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: MacRef/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacRef/MacRef.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: MacRef/MacRef.entitlements
      properties:
        com.apple.security.app-sandbox: false
    scheme:
      environmentVariables:
        OS_ACTIVITY_MODE: disable
