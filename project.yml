name: MacRef
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    ARCHS: arm64
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: YES

targets:
  MacRef:
    type: application
    platform: macOS
    sources:
      - MacRef
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.MacRef
        PRODUCT_NAME: MacRef
        INFOPLIST_FILE: MacRef/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacRef/MacRef.entitlements
