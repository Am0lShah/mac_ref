name: Build MacRef DMG

# Triggers: every push to main, or manually from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package MacRef
    runs-on: macos-14        # Apple Silicon runner (M1) — free on GitHub
    permissions:
      contents: write

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Xcode 16 and Install xcodegen ──────────────────────────
      - name: Setup Environment
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -n 1)
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "$XCODE_APP/Contents/Developer"
            echo "Selected Xcode: $XCODE_APP"
          else
            echo "Xcode 16 not found, using default"
          fi
          brew install xcodegen

      # ── 3. Generate Xcode project ─────────────────────────────────────
      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml > build_log.txt 2>&1 || (cat build_log.txt && exit 1)
          xcodebuild -list >> build_log.txt 2>&1 || true

      # ── 4. Build Release binary (no code signing) ─────────────────────
      - name: Build
        run: |
          touch build_log.txt
          xcodebuild clean build \
            -project MacRef.xcodeproj \
            -scheme MacRef \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ARCHS=arm64 >> build_log.txt 2>&1 || (cat build_log.txt && exit 1)

      - name: Show Build Log on Failure
        if: failure()
        run: cat build_log.txt || true

      # ── 5. Locate the built .app ──────────────────────────────────────
      - name: Locate .app
        id: find_app
        run: |
          APP=$(find ./DerivedData -name "MacRef.app" -type d | head -1)
          echo "APP_PATH=$APP" >> $GITHUB_OUTPUT
          echo "Found app at: $APP"

      # ── 6. Package as DMG ─────────────────────────────────────────────
      - name: Create DMG
        run: |
          mkdir -p ./dmg_staging
          cp -R "${{ steps.find_app.outputs.APP_PATH }}" ./dmg_staging/MacRef.app
          ln -sf /Applications ./dmg_staging/Applications

          hdiutil create \
            -volname "MacRef" \
            -srcfolder ./dmg_staging \
            -ov \
            -format UDZO \
            MacRef.dmg

          echo "✅ DMG created: MacRef.dmg"
          ls -lh MacRef.dmg

      # ── 7. Upload DMG as a downloadable artifact ──────────────────────
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MacRef-DMG
          path: MacRef.dmg
          retention-days: 30

      # ── 8. Upload Logs on Failure ─────────────────────────────────────
      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MacRef-Build-Logs
          path: |
            build_log.txt
            MacRef.xcodeproj
          retention-days: 5

      # ── 9. Push Logs to Repo ─────────────────────────────────────
      - name: Push Logs to Repo
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add build_log.txt || true
          git commit -m "Upload build log [skip ci]" || true
          git push origin HEAD:main || true
